name: Data Sync Pipeline

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ai-intelligence-archive-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Orchestrator Pipeline
        env:
          DRY_RUN: false
          PYTHONPATH: .
          ENABLE_AUTOCOMMIT: "false"
          ENABLE_AUTOPUSH: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        timeout-minutes: 180  # Phase 8.5 mass expansion can take up to 3 hours initially
        continue-on-error: true  # A failure to ingest one source repository must never terminate the pipeline
        run: |
          python scripts/main.py

      - name: Commit generated changes
        run: |
          git config user.name "salmaanfarisshaik-art"
          git config user.email "salmaanfaris.shaik@gmail.com"
          git add data/ site/ reports/
          if ! git diff --cached --quiet; then
            git commit -m "chore: automated archive sync [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
