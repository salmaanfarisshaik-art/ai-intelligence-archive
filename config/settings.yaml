features:
  enable_ai_enrichment: false
  default_enrichment_provider: gemini
  enable_cross_linking: true
  enable_entity_indexing: true
  enable_search_indexing: true
  enable_analytics: true
  enable_doc_generation: true
  enable_export_generation: true
  enable_dashboard_generation: true
  enable_relationship_graph: true
  enable_local_api: true
  enable_query_engine: true
  enable_plugin_system: true
  enable_release_builder: true
  enable_integrity_checker: true
  enable_snapshot_generation: true
  enable_manifest_generation: true
  enable_graph_api_exports: true
  
  # Phase 6 & 7 Feature Flags
  enable_recommendation_engine: true
  enable_leaderboards: true
  enable_timeline_generation: true
  enable_trend_analysis: true
  enable_advanced_graph: true
  enable_site_generation: true
  enable_repository_auditor: true
  enable_coverage_analysis: true
  enable_schema_auditor: true
  enable_self_documentation: true
  enable_dependency_reports: true
  enable_repository_metrics: true
  
  # Phase 8 Feature Flags
  enable_change_detection: true
  enable_pipeline_decision_engine: true
  enable_auto_site_publish: true
  enable_run_manifest_extensions: true
  enable_auto_commit: true
  enable_auto_push: false

report_generation_flags:
  generate_markdown_reports: true

network:
  retry_counts: 3
  backoff_settings:
    base_seconds: 1
    max_seconds: 10

cache:
  cache_ttl_overrides: {}
